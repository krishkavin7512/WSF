version: '3.8'

services:
  backend-ai:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Values come from a gitignored .env in this directory (or the host shell).
    # main.py requires SUPABASE_SERVICE_ROLE_KEY; safenav.py requires MAPBOX_ACCESS_TOKEN.
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# Note: Supabase services are managed by the Supabase CLI (npx supabase start)
# and are not included in this docker-compose.yml to avoid duplication and 
# ensure parity with production environments.
